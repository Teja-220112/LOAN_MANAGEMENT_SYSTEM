<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — LoanSphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="user-pages/style.css" />
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="brand-icon"><i class="fas fa-landmark"></i></div>
    <div class="auth-logo-text">LoanSphere</div>
  </div>
  <h2 class="auth-title">Welcome Back</h2>
  <p class="auth-subtitle">Sign in to your account to continue</p>

  <form class="mt-4" onsubmit="return false;">
    <div class="mb-3">
      <label for="email" class="form-label-lms">Email Address</label>
      <input type="email" class="form-control-lms" id="email" placeholder="Enter your email" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label-lms">Password</label>
      <input type="password" class="form-control-lms" id="password" placeholder="Enter password" required>
    </div>
    <div class="mb-3">
      <label for="role" class="form-label-lms">Role</label>
      <select class="form-select-lms" id="role" required>
        <option value="">Select role</option>
        <option value="customer">Customer</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="remember">
        <label class="form-check-label" for="remember">Remember me</label>
      </div>
      <a href="#" class="text-primary-lms">Forgot password?</a>
    </div>
    <button type="submit" class="btn btn-primary w-100">Sign In</button>
  </form>

  <div class="text-center mt-4">
    <p class="mb-0">Don't have an account? <a href="register.html" class="text-primary-lms fw-600">Register here</a></p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="user-pages/scripts.js"></script>

<script>
// ===== Frontend Connection Code: login.html =====
document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('form');
    if(form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            try {
                const res = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });
                const result = await res.json();
                if(result.success) {
                    localStorage.setItem('lms_token', result.data.token);
                    localStorage.setItem('lms_user', JSON.stringify(result.data.user));
                    if(result.data.user.role === 'admin') {
                        window.location.href = 'admin-panel/dashboard.html';
                    } else {
                        window.location.href = 'user-pages/dashboard.html';
                    }
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                alert('Connection error');
            }
        });
    }
});
</script>

</body>
</html>
