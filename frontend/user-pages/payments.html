<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoanSphere — Payment History</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="navbar-placeholder"></div>

<main>
  <!-- Page Header -->
  <div class="page-hero" style="padding:44px 0 36px;">
    <div class="container">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb lms-breadcrumb mb-2">
          <li class="breadcrumb-item"><a href="dashboard.html">Dashboard</a></li>
          <li class="breadcrumb-item active">Payment History</li>
        </ol>
      </nav>
      <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:6px;">Payment History</h1>
      <p style="color:rgba(255,255,255,0.65);margin-bottom:0;">
        A complete record of all your EMI payments.
      </p>
    </div>
  </div>

  <div class="container page-section-sm">

    <!-- Summary Mini Cards -->
    <div class="row g-3 mb-4">
      <div class="col-sm-4">
        <div class="stat-card green" style="padding:16px 18px;">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon-wrap green" style="margin-bottom:0;width:38px;height:38px;font-size:1rem;">
              <i class="fas fa-circle-check"></i>
            </div>
            <div>
              <!-- {{ summary.paid_count }} -->
              <div class="stat-value" style="font-size:1.25rem;" id="count-paid">0</div>
              <div class="stat-label">Paid</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-4">
        <div class="stat-card amber" style="padding:16px 18px;">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon-wrap amber" style="margin-bottom:0;width:38px;height:38px;font-size:1rem;">
              <i class="fas fa-clock"></i>
            </div>
            <div>
              <div class="stat-value" style="font-size:1.25rem;" id="count-pending">0</div>
              <div class="stat-label">Pending</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-4">
        <div class="stat-card red" style="padding:16px 18px;">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon-wrap red" style="margin-bottom:0;width:38px;height:38px;font-size:1rem;">
              <i class="fas fa-circle-xmark"></i>
            </div>
            <div>
              <div class="stat-value" style="font-size:1.25rem;" id="count-failed">0</div>
              <div class="stat-label">Failed</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="d-flex flex-wrap gap-3 align-items-center justify-content-between mb-3">
      <div class="search-wrap" style="max-width:300px;width:100%;">
        <i class="fas fa-magnifying-glass search-icon"></i>
        <input type="text" id="table-search" class="form-control" placeholder="Search by ID, loan…" />
      </div>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" style="width:auto;">
          <option value="">All Status</option>
          <option value="paid">Paid</option>
          <option value="pending">Pending</option>
          <option value="failed">Failed</option>
        </select>
        <input type="month" class="form-control form-control-sm" style="width:auto;" title="Filter by month" />
        <button class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-download me-1"></i>Export
        </button>
      </div>
    </div>

    <!-- Table Card -->
    <div class="lms-card">
      <div class="table-responsive">
        <!-- {% for payment in payments %} -->
        <table class="lms-table" id="payments-table">
          <thead>
            <tr>
              <th>Payment ID</th>
              <th>Loan ID</th>
              <th>EMI #</th>
              <th>Amount Paid</th>
              <th>Payment Date</th>
              <th>Method</th>
              <th>Status</th>
              <th>Receipt</th>
            </tr>
          </thead>
          <tbody id="payments-tbody">
            <tr>
              <td colspan="8">
                <div class="empty-state">
                  <i class="fas fa-receipt"></i>
                  <p class="mt-2">No payment records found.</p>
                </div>
              </td>
            </tr>
            <!--
              Backend row template (Flask/Jinja2):
              {% for payment in payments %}
              <tr class="searchable-row">
                <td><span style="font-family:'DM Mono',monospace;font-size:0.8125rem;">{{ payment.payment_id }}</span></td>
                <td><a href="loan_details.html?id={{ payment.loan_id }}">#{{ payment.loan_id }}</a></td>
                <td>{{ payment.installment_number }}</td>
                <td>₹{{ payment.amount_paid | format_number }}</td>
                <td>{{ payment.payment_date | format_date }}</td>
                <td>{{ payment.method }}</td>
                <td>
                  {% if payment.status == 'Paid' %}
                    <span class="badge-status badge-paid">Paid</span>
                  {% elif payment.status == 'Pending' %}
                    <span class="badge-status badge-pending">Pending</span>
                  {% else %}
                    <span class="badge-status badge-failed">Failed</span>
                  {% endif %}
                </td>
                <td>
                  {% if payment.status == 'Paid' %}
                    <a href="/receipt/{{ payment.payment_id }}" class="btn btn-sm btn-outline-secondary">
                      <i class="fas fa-file-pdf"></i>
                    </a>
                  {% else %}—{% endif %}
                </td>
              </tr>
              {% endfor %}
            -->
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 px-4 py-3"
        style="border-top:1px solid var(--slate-100);">
        <span style="font-size:0.8125rem;color:var(--slate-500);">Showing 0–0 of 0 payments</span>
        <nav>
          <ul class="pagination lms-pagination mb-0">
            <li class="page-item disabled"><a class="page-link" href="#"><i class="fas fa-chevron-left"></i></a></li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item disabled"><a class="page-link" href="#"><i class="fas fa-chevron-right"></i></a></li>
          </ul>
        </nav>
      </div>
    </div>

  </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="scripts.js"></script>

<script>
// ===== Frontend Connection Code: payments.html =====
async function apiCall(endpoint, method='GET', body=null) {
    const token = localStorage.getItem('lms_token');
    if(!token) { window.location.href = 'login.html'; return; }
    const options = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` } };
    if(body) options.body = JSON.stringify(body);
    const res = await fetch(`http://localhost:3000${endpoint}`, options);
    if(res.status === 401) { window.location.href = 'login.html'; return; }
    return res.json();
}
document.addEventListener('DOMContentLoaded', async () => {
    if(!localStorage.getItem('lms_token')) window.location.href = 'login.html';
    const tbody = document.getElementById('payments-tbody') || document.querySelector('table tbody');
    if(tbody) tbody.innerHTML = '<tr><td colspan="7" class="text-center">Loading...</td></tr>';
    
    try {
        const [histRes, sumRes] = await Promise.all([
            apiCall('/api/payments/history'),
            apiCall('/api/payments/summary')
        ]);
        
        if(histRes && histRes.success) {
            if(tbody) {
                tbody.innerHTML = '';
                const payments = histRes.data;
                const formatCur = (n) => '₹' + (n||0).toLocaleString('en-IN');
                const dt = d => d ? new Date(d).toLocaleDateString('en-GB') : 'N/A';
                
                if(payments.length === 0) tbody.innerHTML = '<tr><td colspan="7" class="text-center">No payment records found.</td></tr>';
                
                payments.forEach(p => {
                    const badgeClass = p.status === 'Paid' ? 'badge-active' : p.status === 'Pending' ? 'badge-pending' : 'badge-failed';
                    tbody.innerHTML += `
                    <tr>
                        <td class="td-mono">${p.transaction_id || 'N/A'}</td>
                        <td>${dt(p.payment_date)}</td>
                        <td>${p.loanId ? p.loanId.loan_purpose : 'N/A'}</td>
                        <td>Inst #${p.installment_number}</td>
                        <td class="td-mono">${formatCur(p.amount_paid)}</td>
                        <td>${p.method}</td>
                        <td><span class="badge-status ${badgeClass}">${p.status}</span></td>
                    </tr>`;
                });
            }
        }
        
        if(sumRes && sumRes.success) {
            const paidCountEl = document.getElementById('count-paid');
            if(paidCountEl) paidCountEl.textContent = sumRes.data.paidCount;
            
            const pndCountEl = document.getElementById('count-pending');
            if(pndCountEl) pndCountEl.textContent = sumRes.data.pendingCount;
            
            const fldCountEl = document.getElementById('count-failed');
            if(fldCountEl) fldCountEl.textContent = sumRes.data.failedCount;
        }
    } catch(err) {
        if(tbody) tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Error loading data</td></tr>';
    }
});
</script>

</body>
</html>
