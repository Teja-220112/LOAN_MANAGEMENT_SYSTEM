<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinCore LMS – Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #1a237e;
      --navy-dk:  #0d1757;
      --green:    #4caf50;
      --text:     #1a1a2e;
      --text-mid: #4a4a6a;
      --text-lt:  #9999bb;
      --border:   #d4d8ee;
      --white:    #ffffff;
      --input-bg: #f7f8fc;
      --font:     'Poppins', sans-serif;
    }

    html, body {
      min-height: 100%;
      font-family: var(--font);
      background: #f0f4f8;
    }

    /* ══════════════════════════════════
       SPLIT LAYOUT
    ══════════════════════════════════ */
    .split {
      display: flex;
      min-height: 100vh;
    }

    /* LEFT PANEL */
    .left-panel {
      flex: 1.05;
      background: linear-gradient(160deg, #edf7ee 0%, #deeede 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }
    .left-panel::before {
      content: '';
      position: absolute; top: -90px; right: -90px;
      width: 280px; height: 280px; border-radius: 50%;
      background: rgba(76,175,80,.12);
    }
    .left-panel::after {
      content: '';
      position: absolute; bottom: -70px; left: -70px;
      width: 220px; height: 220px; border-radius: 50%;
      background: rgba(26,35,126,.07);
    }

    .brand { text-align: center; margin-bottom: 28px; z-index: 1; }
    .brand h1 {
      font-size: 2.9rem; font-weight: 800;
      color: var(--navy); letter-spacing: -1.5px;
    }
    .brand p {
      margin-top: 10px; font-size: .97rem;
      color: var(--text-mid); line-height: 1.65;
    }

    .illus { width: 100%; max-width: 460px; z-index: 1; }
    .illus svg { width: 100%; height: auto; display: block; }

    /* RIGHT PANEL */
    .right-panel {
      flex: 1;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 44px 44px;
    }

    /* REGISTER CARD */
    .reg-card {
      width: 100%;
      max-width: 440px;
      border: 1.8px solid var(--border);
      border-radius: 18px;
      padding: 40px 38px;
      box-shadow: 0 8px 32px rgba(26,35,126,.09);
      background: var(--white);
    }

    /* ── FORM STYLES ── */
    .form-title {
      font-size: 1.55rem; font-weight: 700;
      color: var(--text); margin-bottom: 24px;
    }

    .fgroup { margin-bottom: 16px; }
    .fgroup label {
      display: block; font-size: .83rem;
      font-weight: 600; color: var(--text); margin-bottom: 6px;
    }
    .fgroup input {
      width: 100%; padding: 11px 14px;
      font-family: var(--font); font-size: .88rem;
      color: var(--text); background: var(--input-bg);
      border: 1.5px solid var(--border); border-radius: 9px;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .fgroup input::placeholder { color: var(--text-lt); font-weight: 300; }
    .fgroup input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(26,35,126,.08);
      background: var(--white);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* eye toggle */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 40px; }
    .eye {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); cursor: pointer;
      font-size: .95rem; opacity: .4;
      transition: opacity .2s; user-select: none;
    }
    .eye:hover { opacity: .85; }

    /* checkbox */
    .cb-row {
      display: flex; align-items: flex-start;
      gap: 10px; margin-bottom: 18px;
    }
    .cb-row input[type="checkbox"] {
      width: 16px; height: 16px; margin-top: 2px;
      accent-color: var(--navy); cursor: pointer; flex-shrink: 0;
    }
    .cb-row label {
      font-size: .83rem; color: var(--text-mid);
      cursor: pointer; line-height: 1.5;
    }
    .a-link {
      color: var(--navy); font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: color .2s;
    }
    .a-link:hover { color: var(--green); text-decoration: underline; }

    /* submit btn */
    .btn {
      width: 100%; padding: 13px;
      background: var(--navy); color: var(--white);
      border: none; border-radius: 9px;
      font-family: var(--font); font-size: .97rem;
      font-weight: 600; cursor: pointer; letter-spacing: .3px;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .btn:hover {
      background: var(--navy-dk);
      box-shadow: 0 6px 22px rgba(26,35,126,.28);
      transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }

    .bottom-note {
      text-align: center; font-size: .85rem;
      color: var(--text-mid); margin-top: 16px;
    }

    /* ══ MODAL ══ */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,14,60,.45);
      backdrop-filter: blur(4px);
      z-index: 999; align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .mbox {
      background: var(--white); border-radius: 18px;
      padding: 44px 38px; max-width: 380px; width: 90%;
      text-align: center; box-shadow: 0 20px 60px rgba(26,35,126,.18);
      animation: pop .24s ease;
    }
    @keyframes pop {
      from { transform: scale(.88); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .micon {
      width: 66px; height: 66px; border-radius: 50%;
      background: linear-gradient(135deg,#e8f5e9,#c8e6c9);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px; font-size: 1.9rem;
    }
    .mbox h3 { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .mbox p  { font-size: .88rem; color: var(--text-mid); line-height: 1.6; margin-bottom: 24px; }
    .mbtn {
      width: 100%; padding: 12px; background: var(--navy);
      color: var(--white); border: none; border-radius: 9px;
      font-family: var(--font); font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .mbtn:hover { background: var(--navy-dk); }

    /* ══ responsive ══ */
    @media(max-width:860px) {
      .split { flex-direction: column; }
      .left-panel { padding: 36px 24px; }
      .right-panel { padding: 36px 24px; }
      .brand h1 { font-size: 2.2rem; }
    }
    @media(max-width:520px) {
      .reg-card { padding: 28px 20px; }
      .form-title { font-size: 1.2rem; }
      .two-col { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

<div class="split">

  <!-- LEFT PANEL — same illustration as login -->
  <div class="left-panel">
    <div class="brand">
      <h1>FinCore LMS</h1>
      <p>Streamline your loan management,<br>easily track EMIs and payments.</p>
    </div>
    <div class="illus">
      <svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg">
        <!-- bg circles -->
        <circle cx="270" cy="200" r="168" fill="#e8f5e9" opacity=".45"/>
        <circle cx="270" cy="200" r="122" fill="#c8e6c9" opacity=".28"/>
        <!-- ground -->
        <rect x="55" y="310" width="424" height="10" rx="5" fill="#81c784" opacity=".45"/>

        <!-- ── BIG FORM / DOCUMENT ── -->
        <rect x="170" y="118" width="200" height="178" rx="12" fill="white" stroke="#d0d8f0" stroke-width="2"/>
        <rect x="185" y="134" width="110" height="9"  rx="4" fill="#1a237e" opacity=".7"/>
        <rect x="185" y="152" width="170" height="7"  rx="3" fill="#e0e0e0"/>
        <rect x="185" y="166" width="170" height="7"  rx="3" fill="#e0e0e0"/>
        <rect x="185" y="182" width="130" height="7"  rx="3" fill="#e0e0e0"/>
        <rect x="185" y="200" width="170" height="22" rx="5" fill="#f0f4ff" stroke="#d0d8f0" stroke-width="1.2"/>
        <rect x="185" y="230" width="170" height="22" rx="5" fill="#f0f4ff" stroke="#d0d8f0" stroke-width="1.2"/>
        <rect x="185" y="260" width="170" height="22" rx="5" fill="#f0f4ff" stroke="#d0d8f0" stroke-width="1.2"/>
        <!-- submit button on doc -->
        <rect x="210" y="292" width="120" height="24" rx="6" fill="#1a237e"/>
        <text x="232" y="309" font-size="10" fill="white" font-family="sans-serif" font-weight="bold">Create Account</text>

        <!-- ── PERSON LEFT (sitting) ── -->
        <circle cx="110" cy="256" r="21" fill="#ffcc80"/>
        <path d="M90 248 Q110 232 130 248 Q128 236 110 232 Q92 236 90 248Z" fill="#4e342e"/>
        <path d="M89 295 Q110 280 131 295 L137 358 Q110 368 83 358Z" fill="#1565c0"/>
        <rect x="84"  y="324" width="17" height="34" rx="5" fill="#1565c0"/>
        <rect x="125" y="324" width="17" height="34" rx="5" fill="#1565c0"/>
        <!-- laptop -->
        <rect x="76" y="278" width="72" height="21" rx="4" fill="#546e7a"/>
        <rect x="72" y="297" width="80" height="6"  rx="2" fill="#455a64"/>
        <!-- arm pointing at screen -->
        <line x1="130" y1="286" x2="168" y2="252" stroke="#ffcc80" stroke-width="6.5" stroke-linecap="round"/>

        <!-- ── PERSON RIGHT (standing) ── -->
        <circle cx="420" cy="190" r="21" fill="#ffcc80"/>
        <path d="M400 192 Q420 177 440 192 Q438 180 420 176 Q402 180 400 192Z" fill="#212121"/>
        <path d="M400 230 Q420 215 440 230 L446 360 Q420 370 394 360Z" fill="#2e7d32"/>
        <!-- hand with pen pointing at doc -->
        <line x1="400" y1="246" x2="372" y2="222" stroke="#ffcc80" stroke-width="6.5" stroke-linecap="round"/>
        <circle cx="367" cy="218" r="5" fill="#ffb74d"/>

        <!-- ── PERSON FAR RIGHT ── -->
        <circle cx="494" cy="198" r="19" fill="#ffb74d"/>
        <path d="M475 200 Q494 186 513 200 Q511 188 494 184 Q477 188 475 200Z" fill="#5d4037"/>
        <path d="M475 236 Q494 222 513 236 L518 360 Q494 370 470 360Z" fill="#4a148c"/>

        <!-- ── DOLLAR / ICONS ── -->
        <text x="68"  y="182" font-size="28" fill="#4caf50" opacity=".82" font-weight="bold">$</text>
        <text x="456" y="152" font-size="24" fill="#4caf50" opacity=".72" font-weight="bold">$</text>
        <text x="370" y="96"  font-size="20" fill="#1565c0" opacity=".60" font-weight="bold">$</text>

        <!-- ── SPEECH BUBBLE ── -->
        <rect x="330" y="110" width="118" height="58" rx="11" fill="white" stroke="#4caf50" stroke-width="2"/>
        <polygon points="350,168 366,190 382,168" fill="white"/>
        <polygon points="350,168 366,190 382,168" fill="none" stroke="#4caf50" stroke-width="2"/>
        <rect x="342" y="127" width="86" height="7" rx="3" fill="#e0e0e0"/>
        <rect x="342" y="141" width="66" height="7" rx="3" fill="#c8e6c9"/>

        <!-- ── MINI LINE CHART ── -->
        <rect x="54" y="104" width="82" height="68" rx="9" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
        <polyline points="66,156 82,138 98,146 114,122 132,132" fill="none" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="66"  cy="156" r="3.5" fill="#4caf50"/>
        <circle cx="114" cy="122" r="3.5" fill="#4caf50"/>

        <!-- ── PLANT ── -->
        <rect x="36" y="328" width="14" height="40" rx="3" fill="#795548"/>
        <ellipse cx="43" cy="318" rx="21" ry="24" fill="#388e3c"/>
        <ellipse cx="30" cy="326" rx="14" ry="16" fill="#4caf50"/>
        <ellipse cx="56" cy="326" rx="14" ry="16" fill="#4caf50"/>

        <!-- ── COINS ── -->
        <ellipse cx="356" cy="302" rx="17" ry="5.5" fill="#ffd54f"/>
        <ellipse cx="356" cy="297" rx="17" ry="5.5" fill="#ffca28"/>
        <ellipse cx="356" cy="292" rx="17" ry="5.5" fill="#ffd54f"/>

        <!-- checkmark badge top-right of form -->
        <circle cx="376" cy="122" r="16" fill="#4caf50"/>
        <text x="369" y="128" font-size="14" fill="white" font-weight="bold">✓</text>
      </svg>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="reg-card">
      <h2 class="form-title">Create Account</h2>

      <div class="fgroup">
        <label>Full Name</label>
        <input type="text" id="r-fullname" placeholder="Enter full name"/>
      </div>

      <div class="two-col">
        <div class="fgroup">
          <label>First Name</label>
          <input type="text" id="r-fname" placeholder="First name"/>
        </div>
        <div class="fgroup">
          <label>Last Name</label>
          <input type="text" id="r-lname" placeholder="Last name"/>
        </div>
      </div>

      <div class="fgroup">
        <label>Email Address</label>
        <input type="email" id="r-email" placeholder="Enter your email"/>
      </div>

      <div class="fgroup">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="r-pwd" placeholder="Create password"/>
          <span class="eye" onclick="toggleEye('r-pwd',this)">👁</span>
        </div>
      </div>

      <div class="fgroup">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="r-cpwd" placeholder="Confirm password"/>
          <span class="eye" onclick="toggleEye('r-cpwd',this)">👁</span>
        </div>
      </div>

      <div class="cb-row">
        <input type="checkbox" id="r-agree"/>
        <label for="r-agree">
          I agree to <a class="a-link">Terms &amp; Policy</a> &amp; <a class="a-link">Privacy</a>
        </label>
      </div>

      <button class="btn" onclick="doRegister()">Submit</button>

      <p class="bottom-note">
        Already have an account?
        <a class="a-link" onclick="window.location.href='login.html'">Sign In</a>
      </p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" onclick="closeModal()">
  <div class="mbox" onclick="event.stopPropagation()">
    <div class="micon" id="m-icon">🎉</div>
    <h3 id="m-title">Account Created!</h3>
    <p  id="m-msg">Your account has been created successfully.</p>
    <button class="mbtn" id="m-btn" onclick="modalNext()">Go to Homepage</button>
  </div>
</div>

<script>
  var _next = null;

  function toggleEye(id, el) {
    var inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    el.style.opacity = inp.type === 'text' ? '1' : '.4';
  }

  function openModal(icon, title, msg, btn, next) {
    document.getElementById('m-icon').textContent  = icon;
    document.getElementById('m-title').textContent = title;
    document.getElementById('m-msg').textContent   = msg;
    document.getElementById('m-btn').textContent   = btn;
    _next = next;
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  function modalNext() {
    closeModal();
    if (_next) { _next(); _next = null; }
  }

  function doRegister() {
    var fn  = document.getElementById('r-fullname').value.trim();
    var em  = document.getElementById('r-email').value.trim();
    var pw  = document.getElementById('r-pwd').value.trim();
    var cp  = document.getElementById('r-cpwd').value.trim();
    var ag  = document.getElementById('r-agree').checked;
    if (!fn || !em || !pw || !cp) { alert('Please fill in all required fields.'); return; }
    if (pw !== cp) { alert('Passwords do not match.'); return; }
    if (!ag) { alert('Please agree to the Terms & Policy and Privacy.'); return; }
    openModal('🎉', 'Account Created Successfully!',
      'Your account has been created. You can now access the homepage.',
      'Go to Homepage',
      function() { alert('Navigating to Homepage…'); });
  }
</script>
</body>
</html>
