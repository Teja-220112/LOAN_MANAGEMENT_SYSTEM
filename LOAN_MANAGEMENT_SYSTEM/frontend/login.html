<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — LMS-Sphere-Simulator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="user-pages/style.css" />

  <script src="config.js"></script>
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="brand-icon"><i class="fas fa-landmark"></i></div>
    <div class="auth-logo-text">LMS-Sphere-Simulator</div>
  </div>
  <h2 class="auth-title">Welcome Back</h2>
  <p class="auth-subtitle">Sign in to your account to continue</p>

  <form class="mt-4" onsubmit="return false;">
    <div class="mb-3">
      <label for="email" class="form-label-lms">Email Address</label>
      <input type="email" class="form-control-lms" id="email" name="email" placeholder="Enter your email" required>
    </div>
    <div class="mb-3" id="password-group">
      <label for="password" class="form-label-lms">Password</label>
      <input type="password" class="form-control-lms" id="password" name="password" placeholder="Enter password" required>
    </div>
    <div class="mb-3 d-none" id="otp-group">
      <label for="otp" class="form-label-lms">OTP Code</label>
      <input type="text" class="form-control-lms" id="otp" name="otp" placeholder="Enter 6-digit OTP sent to your email">
    </div>
    <div class="mb-3">
      <label for="role" class="form-label-lms">Role</label>
      <select class="form-select-lms" id="role" required>
        <option value="">Select role</option>
        <option value="customer">Customer</option>
        <option value="admin">Admin</option>
        <option value="manager">Manager</option>
      </select>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="remember">
        <label class="form-check-label" for="remember">Remember me</label>
      </div>
      <a href="#" class="text-primary-lms">Forgot password?</a>
    </div>
    <button type="submit" class="btn btn-primary w-100">Sign In</button>
  </form>

  <div class="text-center mt-4">
    <p class="mb-2">Don't have an account? <a href="register.html" class="text-primary-lms fw-600">Register here</a></p>
    <p style="font-size:0.75rem; color:var(--slate-400); line-height:1.4;">
      <strong>DEMO PROJECT NOTICE:</strong> This is a technology demonstration. <br>
      Do not enter real financial passwords. <br>
      Built for portfolio &amp; learning purposes.
    </p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="user-pages/scripts.js"></script>

<script>
// ===== Frontend Connection Code: login.html =====
document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('form');
    if(form) {
        let pendingUserId = null;
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                otp: document.getElementById('otp') ? document.getElementById('otp').value : ''
            };
            
            try {
                if (!pendingUserId) {
                    const res = await fetch(window.API_BASE_URL + '/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: data.email, password: data.password })
                    });
                    const result = await res.json();
                    
                    if(result.success) {
                        if (result.requiresOtp) {
                            pendingUserId = result.userId;
                            document.getElementById('password-group').classList.add('d-none');
                            document.getElementById('email').readOnly = true;
                            document.getElementById('otp-group').classList.remove('d-none');
                            document.getElementById('otp').required = true;
                            document.querySelector('button[type="submit"]').textContent = 'Verify OTP';
                        } else {
                            completeLogin(result.data.token, result.data.user);
                        }
                    } else {
                        alert('Error: ' + result.error);
                    }
                } else {
                    const res = await fetch(window.API_BASE_URL + '/api/auth/verify-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId: pendingUserId, otp: data.otp })
                    });
                    const result = await res.json();
                    if(result.success) {
                        completeLogin(result.data.token, result.data.user);
                    } else {
                        alert('Error: ' + result.error);
                    }
                }
            } catch (err) {
                alert('Connection error');
            }
        });

        function completeLogin(token, user) {
            localStorage.setItem('lms_token', token);
            localStorage.setItem('lms_user', JSON.stringify(user));
            if(user.role === 'admin') {
                window.location.href = 'admin-panel/dashboard.html';
            } else if (user.role === 'manager') {
                window.location.href = 'manager-panel/dashboard.html';
            } else {
                window.location.href = 'user-pages/dashboard.html';
            }
        }
    }
});
</script>

</body>
</html>
