<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — LoanSphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="user-pages/style.css" />
</head>
<body class="auth-page">

<div class="auth-card">
  <div class="auth-logo">
    <div class="brand-icon"><i class="fas fa-landmark"></i></div>
    <div class="auth-logo-text">LoanSphere</div>
  </div>
  <h2 class="auth-title">Create Account</h2>
  <p class="auth-subtitle">Join us today and start managing your loans</p>

  <form class="mt-4" onsubmit="return false;">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="firstName" class="form-label-lms">First Name</label>
        <input type="text" class="form-control-lms" id="firstName" name="firstName" placeholder="Enter first name" required>
      </div>
      <div class="col-md-6 mb-3">
        <label for="lastName" class="form-label-lms">Last Name</label>
        <input type="text" class="form-control-lms" id="lastName" name="lastName" placeholder="Enter last name" required>
      </div>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label-lms">Email Address</label>
      <input type="email" class="form-control-lms" id="email" name="email" placeholder="Enter your email" required>
    </div>
    <div class="mb-3">
      <label for="phone" class="form-label-lms">Phone Number</label>
      <input type="tel" class="form-control-lms" id="phone" name="phone" placeholder="Enter phone number" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label-lms">Password</label>
      <input type="password" class="form-control-lms" id="password" name="password" placeholder="Create password" required>
    </div>
    <div class="mb-3">
      <label for="confirmPassword" class="form-label-lms">Confirm Password</label>
      <input type="password" class="form-control-lms" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required>
    </div>
    <div class="mb-4">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="agree" required>
        <label class="form-check-label" for="agree">
          I agree to the <a href="#" class="text-primary-lms">Terms & Conditions</a> and <a href="#" class="text-primary-lms">Privacy Policy</a>
        </label>
      </div>
    </div>
    <button type="submit" class="btn btn-primary w-100">Create Account</button>
  </form>

  <div class="text-center mt-4">
    <p class="mb-0">Already have an account? <a href="login.html" class="text-primary-lms fw-600">Sign in here</a></p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="user-pages/scripts.js"></script>

<script>
// ===== Frontend Connection Code: register.html =====
document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('form');
    if(form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            // Map form fields to API fields
            const payload = {
                firstName: data.firstName || data.fname || data.name?.split(' ')[0] || 'User',
                lastName: data.lastName || data.lname || data.name?.split(' ')[1] || 'Name',
                email: data.email,
                phone: data.phone,
                password: data.password,
                national_id: data.national_id || data.aadhar || '',
            };
            try {
                const res = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if(result.success) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                alert('Connection error');
            }
        });
    }
});
</script>

</body>
</html>
