<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LMS-Sphere-Simulator — Login</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css"/>

  <script src="../config.js"></script>
</head>
<body>

<!-- ============================================================
  LOGIN PAGE
============================================================ -->
<div class="login-page">

  <!-- Background Blobs -->
  <div class="login-bg-shape s1"></div>
  <div class="login-bg-shape s2"></div>

  <div class="login-card">

    <!-- Card Header -->
    <div class="login-card-header">
      <div class="login-logo">
        <i class="fas fa-landmark"></i>
      </div>
      <div class="login-title">LMS-Sphere-Simulator</div>
      <div class="login-subtitle">Loan Management System — Staff Portal</div>
    </div>

    <!-- Card Body -->
    <div class="login-card-body">
      <form id="loginForm" class="login-form" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="adminEmail">Email Address</label>
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input
              type="email"
              id="adminEmail"
              class="form-control"
              placeholder="staff@loanpro.com"
              autocomplete="email"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="adminPassword">Password</label>
          <div class="input-group" style="position:relative;">
            <i class="fas fa-lock input-icon"></i>
            <input
              type="password"
              id="adminPassword"
              class="form-control"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <!-- Toggle password visibility -->
            <button
              type="button"
              id="togglePassword"
              style="position:absolute;right:14px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:#94a3b8;cursor:pointer;font-size:14px;"
              aria-label="Toggle password"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#64748b;cursor:pointer;">
            <input type="checkbox" id="rememberMe" style="accent-color:#3b82f6;width:15px;height:15px;" />
            Remember me
          </label>
          <a href="#" style="font-size:13px;color:#3b82f6;font-weight:500;">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt me-2"></i> Sign In to Dashboard
        </button>

      </form>
    </div>

    <!-- Card Footer -->
    <div class="login-footer">
      <i class="fas fa-shield-halved me-1"></i>
      Secured with 256-bit SSL encryption &nbsp;|&nbsp; v2.4.1
    </div>

  </div><!-- /login-card -->

</div><!-- /login-page -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Toggle password visibility
  document.getElementById('togglePassword').addEventListener('click', function () {
    const input = document.getElementById('adminPassword');
    const icon  = this.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });
</script>


<script>
// ===== Frontend Connection Code: admin login.html =====
document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('form');
    if(form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            try {
                const res = await fetch(window.API_BASE_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: data.email, password: data.password })
                });
                const result = await res.json();
                if(result.success && (result.data.user.role === 'admin' || result.data.user.role === 'manager')) {
                    localStorage.setItem('lms_token', result.data.token);
                    localStorage.setItem('lms_user', JSON.stringify(result.data.user));
                    if (result.data.user.role === 'manager') {
                        window.location.href = '../manager-panel/dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    alert('Error: ' + (result.error || 'Not authorized as staff'));
                }
            } catch (err) {
                alert('Connection error');
            }
        });
    }
});
</script>

</body>
</html>
